name: Deploy to Belmo.io

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Belmo.io
        env:
          BELMO_WORKSPACE_ID: ${{ secrets.BELMO_WORKSPACE_ID }}
          BELMO_API_TOKEN: ${{ secrets.BELMO_API_TOKEN }}
        run: |
          curl -X POST https://api.belmo.io/v1/deploy \
            -H "Authorization: Bearer $BELMO_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"workspace_id\": \"$BELMO_WORKSPACE_ID\",
              \"repository\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\"
            }"
