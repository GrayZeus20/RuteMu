<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Pelacakan dan monitoring kendaraan GPS real-time">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/style.css?v=4">
  <title>RuteMu - Monitoring Kendaraan</title>
</head>
<body>
  <div id="app">
    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <div class="header-logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M19 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M3 10h4l3-5h4l3 5h4"/><path d="M3 10v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/><path d="M7 10V6h10v4"/></svg>
        </div>
        <span class="header-title">RuteMu</span>
        <span class="header-badge">LIVE</span>
        <span class="header-vehicle-name" id="header-vehicle-name"></span>
      </div>
      <div class="header-actions">
        <button class="btn btn-success" id="btn-start-trip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span>Mulai Trip</span>
        </button>
        <button class="btn btn-ghost btn-icon" id="btn-toggle-drawer" title="Toggle Sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
        </button>
        <button class="btn btn-ghost btn-icon" id="btn-add-vehicle" title="Tambah Kendaraan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
        </button>
        <button class="btn btn-ghost btn-icon" id="btn-fit-all" title="Tampilkan Semua">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
        </button>
        <button class="btn btn-ghost btn-icon" id="btn-fullscreen-map" title="Map Fullscreen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="21" y1="3" x2="10" y2="14"/></svg>
        </button>
      </div>
    </header>

    <!-- MAIN -->
    <div class="main">
      <!-- MAP -->
      <div class="map-container">
        <div id="map"></div>

        <!-- Center bottom logo -->
        <div class="map-logo" id="map-logo">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM19 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM3 10h4l3-5h4l3 5h4ZM3 10v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4ZM7 10V6h10v4Z"/></svg>
          <span>RuteMu</span>
        </div>

          <!-- Map overlay buttons -->
        <div class="map-overlay map-overlay-top-right">
          <button class="map-btn" id="btn-locate" title="Lokasi Saya">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2v4"/><path d="M12 18v4"/><path d="M2 12h4"/><path d="M18 12h4"/></svg>
          </button>
        </div>

        <!-- Live trip info panel -->
        <div class="live-panel" id="live-panel">
          <div class="live-panel-header">
            <span class="live-panel-title">
              <span class="live-dot active" id="live-dot"></span>
              Merekam Trip
            </span>
            <button class="btn btn-sm btn-danger" id="btn-stop-trip">Berhenti</button>
          </div>
          <div class="live-grid">
            <div class="live-item">
              <div class="live-value" id="live-speed">0 <span class="live-unit">km/h</span></div>
              <div class="live-label">Kecepatan</div>
            </div>
            <div class="live-item">
              <div class="live-value" id="live-distance">0 <span class="live-unit">m</span></div>
              <div class="live-label">Jarak</div>
            </div>
            <div class="live-item">
              <div class="live-value" id="live-duration">00:00</div>
              <div class="live-label">Durasi</div>
            </div>
          </div>
        </div>

        <!-- Bottom actions (visible when sidebar is hidden) -->
        <div class="bottom-actions" id="bottom-actions">
          <button class="bottom-btn" data-action="vehicles" title="Kendaraan">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M19 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M3 10h4l3-5h4l3 5h4"/><path d="M3 10v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/><path d="M7 10V6h10v4"/></svg>
          </button>
          <button class="bottom-btn" data-action="dashboard" title="Dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </button>
          <button class="bottom-btn" data-action="add-vehicle" title="Tambah Kendaraan">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
          </button>
          <button class="bottom-btn" data-action="locate" title="Lokasi Saya">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2v4"/><path d="M12 18v4"/><path d="M2 12h4"/><path d="M18 12h4"/></svg>
          </button>
        </div>
      </div>

      <!-- DRAWER (sidebar) -->
      <div class="drawer">
        <!-- Mini vehicle info bar (mobile) -->
        <div class="mini-vehicle-bar" id="mini-vehicle-bar">
          <div class="mini-v-left">
            <div class="mini-v-avatar" id="mini-v-avatar">?</div>
            <div class="mini-v-info">
              <div class="mini-v-name" id="mini-v-name">Pilih kendaraan</div>
              <div class="mini-v-meta" id="mini-v-meta">—</div>
            </div>
          </div>
          <div class="mini-v-status" id="mini-v-status">offline</div>
        </div>

        <!-- Tab: Vehicles -->
        <div class="tab-content active" id="tab-vehicles">
          <div class="vehicle-add-row">
            <input type="text" placeholder="Nama kendaraan..." id="add-vehicle-name">
            <input type="color" id="add-vehicle-color" value="#6366f1">
            <button class="btn btn-primary" id="add-vehicle-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            </button>
          </div>
          <div class="section-label">Kendaraan Anda</div>
          <div class="vehicle-list" id="vehicle-list">
            <div class="empty-state">
              <div class="empty-state-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M19 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M3 10h4l3-5h4l3 5h4"/><path d="M3 10v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/><path d="M7 10V6h10v4"/></svg>
              </div>
              <div class="empty-state-text">Belum ada kendaraan.<br>Tambah satu untuk mulai tracking!</div>
            </div>
          </div>
        </div>

        <!-- Tab: Dashboard -->
        <div class="tab-content" id="tab-dashboard">
          <div class="stat-cards">
            <div class="stat-card">
              <div class="stat-card-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              </div>
              <div class="stat-card-value" id="current-speed">0</div>
              <div class="stat-card-label">Kecepatan (km/h)</div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              </div>
              <div class="stat-card-value" id="total-distance">0 m</div>
              <div class="stat-card-label">Total Jarak</div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </div>
              <div class="stat-card-value" id="total-trips">0</div>
              <div class="stat-card-label">Total Trip</div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M19 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M3 10h4l3-5h4l3 5h4"/><path d="M3 10v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/><path d="M7 10V6h10v4"/></svg>
              </div>
              <div class="stat-card-value" id="total-vehicles">0</div>
              <div class="stat-card-label">Kendaraan</div>
            </div>
          </div>
          <div class="trip-section-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Riwayat Trip
          </div>
          <div class="trip-list" id="trip-list">
            <div class="empty-state">
              <div class="empty-state-icon">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </div>
              <div class="empty-state-text">Belum ada trip</div>
            </div>
          </div>
        </div>

        <!-- Tab bar (bottom on mobile, top on desktop via column-reverse) -->
        <div class="drawer-tabs">
          <button class="drawer-tab active" data-tab="vehicles">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M19 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M3 10h4l3-5h4l3 5h4"/><path d="M3 10v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/><path d="M7 10V6h10v4"/></svg>
            <span>Kendaraan</span>
          </button>
          <button class="drawer-tab" data-tab="map">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 21 18 21 2 16 6 8 2 1 6z"/><line x1="16" y1="2" x2="16" y2="18"/><line x1="8" y1="2" x2="8" y2="22"/></svg>
            <span>Map</span>
          </button>
          <button class="drawer-tab" data-tab="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>Dashboard</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL: Add Vehicle -->
  <div class="modal-overlay" id="vehicle-modal">
    <div class="modal">
      <h2>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M19 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/><path d="M3 10h4l3-5h4l3 5h4"/><path d="M3 10v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/><path d="M7 10V6h10v4"/></svg>
        Tambah Kendaraan Baru
      </h2>
      <div class="modal-field">
        <label for="modal-vehicle-name">Nama Kendaraan</label>
        <input type="text" id="modal-vehicle-name" placeholder="Contoh: Truk 01, Motor Unit 3">
      </div>
      <div class="modal-field">
        <label for="modal-vehicle-color">Warna</label>
        <input type="color" id="modal-vehicle-color" value="#6366f1">
      </div>
      <button class="btn btn-primary" id="modal-add-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        Tambah Kendaraan
      </button>
    </div>
  </div>

<!-- BEGIN RIDE SCREEN -->
<div id="ride-screen" class="ride-screen" style="display:none">
  <div id="ride-map" class="ride-map"></div>

  <div class="ride-topbar">
    <button class="ride-icon-btn" id="ride-close" title="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="ride-topbar-title">Ride</div>
    <button class="ride-icon-btn" id="ride-settings" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div class="ride-map-actions">
    <button class="ride-icon-btn ride-pill" id="ride-3d" title="3D">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l-8 10h16z"/><path d="M12 22l8-10H4z"/></svg>
      <span class="ride-pill-text">3D</span>
    </button>
    <button class="ride-icon-btn ride-pill" id="ride-layers" title="Layers">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </button>
    <button class="ride-icon-btn ride-pill" id="ride-locate" title="Locate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2v4"/><path d="M12 18v4"/><path d="M2 12h4"/><path d="M18 12h4"/></svg>
    </button>
  </div>

  <div class="ride-toolbar">
    <button class="ride-tool" id="ride-route" title="Route">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17h4l4-8h4l4 8h4"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
    </button>
    <button class="ride-tool active" id="ride-bike" title="Bike">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="12" cy="7" r="2"/><path d="M12 9v4"/><path d="M8 17.5l4-5.5"/><path d="M12 9l4 8.5"/></svg>
    </button>
    <button class="ride-tool" id="ride-heart" title="Heart Rate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
    <button class="ride-tool" id="ride-live" title="Live">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83"/></svg>
    </button>
    <button class="ride-tool" id="ride-spotify" title="Spotify">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z" fill="#1DB954"/><path d="M16.5 15.75c-.25 0-.5-.04-.73-.12a.37.37 0 0 0-.3.06c-.34.27-.76.41-1.21.4-.44-.01-.86-.16-1.24-.45a5.5 5.5 0 0 1-1.01-1.25c-.17-.3-.3-.63-.39-.98a3.6 3.6 0 0 1-.14-.96c0-.33.04-.65.12-.96.08-.31.2-.6.38-.87.17-.27.39-.49.65-.67.26-.18.57-.31.91-.38.34-.07.7-.07 1.04.01.34.07.65.21.92.41.27.2.48.46.63.76.15.3.22.64.22 1 .01.35-.06.68-.19 1zM14.75 12.5c-.23 0-.45-.02-.66-.07-.21-.04-.4-.11-.57-.21-.17-.1-.3-.23-.39-.39-.09-.16-.13-.34-.13-.53 0-.2.04-.39.13-.56.08-.17.2-.32.36-.43.16-.11.34-.19.55-.22.21-.03.43-.02.65.05.22.06.42.16.59.3.17.13.31.3.4.49.09.19.14.4.14.63 0 .22-.04.43-.13.61-.1.18-.22.33-.4.44-.17.11-.37.18-.59.22-.1.02-.21.04-.32.04z" fill="#fff"/></svg>
    </button>
  </div>

  <div class="ride-bottom">
    <button class="ride-icon-btn ride-pill ride-refresh" id="ride-refresh" title="Refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 3L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-3L21 16"/><path d="M16 16h5v5"/></svg>
    </button>
    <button class="ride-start-btn" id="ride-start" title="Start">
      <span>START</span>
    </button>
  </div>
</div>
<!-- END RIDE SCREEN -->

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/api.js"></script>
