<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Dynamics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-black: #0B0E14;
            --surface: #11151D;
            --surface-hover: #1A2030;
            --accent: #00E676;
            --accent-dim: rgba(0, 230, 118, 0.1);
            --text-main: #E5E7EB;
            --text-muted: #6B7280;
            --border: rgba(255, 255, 255, 0.08);
            --font-display: 'Syne', sans-serif;
            --font-data: 'Space Mono', monospace;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        nav {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            height: 60px;
            flex-shrink: 0;
            background: rgba(11, 14, 20, 0.95);
            z-index: 1000;
            position: relative;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
        }

        .nav-status {
            font-family: var(--font-data);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: var(--accent);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-status::before {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .app-layout {
            display: flex;
            height: calc(100vh - 60px);
            width: 100%;
        }

        .map-panel {
            flex: 1;
            min-width: 0;
            position: relative;
            border-right: 1px solid var(--border);
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .map-overlay {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(11, 14, 20, 0.85);
            backdrop-filter: blur(8px);
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            font-family: var(--font-data);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            text-transform: uppercase;
            z-index: 1000;
            pointer-events: none;
        }

        .map-overlay span {
            color: var(--accent);
        }

        .dashboard-panel {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .vehicle-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .vehicle-model {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.5rem;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .vehicle-model small {
            font-weight: 400;
            color: var(--text-muted);
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            font-family: var(--font-data);
            margin-top: 0.25rem;
        }

        .speed-module {
            text-align: right;
        }

        .speed-module .data-value {
            font-size: 3.5rem;
            line-height: 1;
        }

        .speed-module .data-label {
            margin-top: 0.25rem;
        }

        .data-label {
            font-family: var(--font-data);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .data-value {
            font-family: var(--font-display);
            font-weight: 800;
            line-height: 1;
            color: var(--text-main);
        }

        .accent { color: var(--accent); }

        .gauges-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .gauge-cell {
            background: var(--surface);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: background 0.3s;
            min-height: 100px;
        }

        .gauge-cell:hover {
            background: var(--surface-hover);
        }

        .gauge-cell .data-value {
            font-size: 1.75rem;
        }

        .gauge-cell .data-label {
            font-size: 0.65rem;
        }

        .gauge-cell .unit {
            font-family: var(--font-data);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .action-bar {
            display: flex;
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-top: auto;
        }

        .action-btn {
            flex: 1;
            background: var(--surface);
            padding: 1rem;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .action-btn.primary-action {
            background: var(--accent);
            color: var(--bg-black);
        }

        .action-btn.primary-action:hover {
            background: #00c86a;
        }

        @media (max-width: 900px) {
            .app-layout {
                flex-direction: column;
                height: calc(100vh - 60px);
            }

            .map-panel {
                flex: none;
                height: 40vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .dashboard-panel {
                flex: 1;
                min-height: 0;
                padding: 1rem;
                gap: 1rem;
            }

            .vehicle-model { font-size: 1.25rem; }
            .speed-module .data-value { font-size: 2.5rem; }
            .gauges-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 600px) {
            .dashboard-panel { padding: 0.75rem; gap: 0.75rem; }
            .map-panel { height: 30vh; }
            .gauge-cell { padding: 1rem; min-height: 80px; }
            .gauge-cell .data-value { font-size: 1.5rem; }
            .vehicle-header { flex-direction: column; gap: 1rem; padding-bottom: 1rem; }
            .speed-module { text-align: left; }
            .action-bar { flex-direction: column; }
        }

        @media (prefers-reduced-motion: reduce) {
            .nav-status::before { animation: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">APEX<span style="color: var(--accent)">.</span>DYNAMICS</div>
        <div class="nav-status">Live Telemetry</div>
    </nav>

    <div class="app-layout">
        <div class="map-panel">
            <div class="map-overlay">SECTOR <span>1</span> &mdash; LAP <span>7</span></div>
            <div id="map"></div>
        </div>

        <div class="dashboard-panel">
            <div class="vehicle-header">
                <div>
                    <div class="vehicle-model">GT3-R<small>Chassis #004 &middot; Telemetry v3.2</small></div>
                </div>
                <div class="speed-module">
                    <div class="data-value accent" id="speed">248</div>
                    <div class="data-label">KM/H</div>
                </div>
            </div>

            <div class="gauges-grid">
                <div class="gauge-cell">
                    <span class="data-label">RPM</span>
                    <span class="data-value" id="rpm">7,400</span>
                </div>
                <div class="gauge-cell">
                    <span class="data-label">GEAR</span>
                    <span class="data-value" id="gear">05</span>
                </div>
                <div class="gauge-cell">
                    <span class="data-label">TIRE TEMP</span>
                    <span class="data-value" id="tireTemp">84 <span class="unit">&deg;C</span></span>
                </div>
                <div class="gauge-cell">
                    <span class="data-label">OIL PRESS</span>
                    <span class="data-value" id="oilPress">4.2 <span class="unit">BAR</span></span>
                </div>
                <div class="gauge-cell">
                    <span class="data-label">ENGINE LOAD</span>
                    <span class="data-value" id="engineLoad">87 <span class="unit">%</span></span>
                </div>
                <div class="gauge-cell">
                    <span class="data-label">FUEL</span>
                    <span class="data-value" id="fuel">64 <span class="unit">%</span></span>
                </div>
            </div>

            <div class="action-bar">
                <button class="action-btn">Lap Data</button>
                <button class="action-btn">Diagnostics</button>
                <button class="action-btn primary-action">Record Session</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            center: [-7.2504, 112.7688],
            zoom: 14,
            zoomControl: false,
            attributionControl: false
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        const vehicleIcon = L.divIcon({
            className: 'custom-marker',
            html: '<div style="width:16px;height:16px;background:#00E676;border:3px solid rgba(0,230,118,0.3);border-radius:50%;box-shadow:0 0 20px rgba(0,230,118,0.5);"></div>',
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        const marker = L.marker([-7.2504, 112.7688], { icon: vehicleIcon }).addTo(map);

        function simulateMovement() {
            const lat = -7.2504 + (Math.random() - 0.5) * 0.002;
            const lng = 112.7688 + (Math.random() - 0.5) * 0.002;
            marker.setLatLng([lat, lng]);
            map.panTo([lat, lng], { animate: true, duration: 1.5 });
        }

        setInterval(simulateMovement, 3000);

        function randRange(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        setInterval(() => {
            const speedEl = document.getElementById('speed');
            const rpmEl = document.getElementById('rpm');
            const gearEl = document.getElementById('gear');
            const tireEl = document.getElementById('tireTemp');
            const oilEl = document.getElementById('oilPress');
            const loadEl = document.getElementById('engineLoad');
            const fuelEl = document.getElementById('fuel');

            if (speedEl) speedEl.textContent = randRange(210, 275);
            if (rpmEl) rpmEl.textContent = randRange(6200, 7800).toLocaleString();
            if (gearEl) gearEl.textContent = String(randRange(4, 6)).padStart(2, '0');
            if (tireEl) tireEl.innerHTML = randRange(78, 95) + ' <span class="unit">&deg;C</span>';
            if (oilEl) oilEl.innerHTML = (Math.random() * 2 + 3).toFixed(1) + ' <span class="unit">BAR</span>';
            if (loadEl) loadEl.innerHTML = randRange(65, 95) + ' <span class="unit">%</span>';
            if (fuelEl) fuelEl.innerHTML = randRange(45, 75) + ' <span class="unit">%</span>';
        }, 2000);
    </script>
</body>
</html>
